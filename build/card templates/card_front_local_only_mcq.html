<div id="afx-config-field" style="display: none !important;">{{AnkiFXConfig}}</div>

<script>
    (function () {
        // --- 0. Configurations & Logs ---
        window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
        function afxLog(msg, level) {
            window.AnkiFX_Loader_Logs.push({ msg: "[Loader] " + msg, level: level || 'info' });
        }
        afxLog("Template loader started.");

        // --- 1. Dynamic Non-Blocking Config Loading ---
        var fieldContainer = document.getElementById("afx-config-field");
        var configText = fieldContainer ? fieldContainer.textContent.trim() : "";
        
        function decodeConfig(config) {
            if (config && typeof config.termsText === 'string') {
                try {
                    config.termsText = decodeURIComponent(escape(atob(config.termsText)));
                } catch (e) {
                    afxLog("Failed to decode termsText: " + e.message, "error");
                }
            }
            return config;
        }

        var configPromise = new Promise(function (resolve) {
            if (configText) {
                configText = configText.replace(/\u00a0/g, ' ');
                configText = configText.replace(/,(\s*[\]}])/g, '$1').trim();
                try {
                    var parsedConfig = decodeConfig(JSON.parse(configText));
                    window.AnkiFX_Config = parsedConfig;
                    afxLog("Embedded config parsed successfully.", "success");
                    resolve(parsedConfig);
                    return;
                } catch (e) {
                    afxLog("Failed to parse embedded config. Falling back. Error: " + e.message, "warn");
                }
            }

            afxLog("Fetching fallback config _afx_defaults.json...", "pending");
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "_afx_defaults.json", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    var parsed = null;
                    if (xhr.status === 200 || xhr.status === 0) {
                        try {
                            parsed = decodeConfig(JSON.parse(xhr.responseText));
                            afxLog("Fallback defaults config loaded.", "success");
                        } catch (err) {
                            afxLog("Failed to parse defaults config: " + err.message, "error");
                        }
                    } else {
                        afxLog("Failed to load defaults config. Status: " + xhr.status, "error");
                    }
                    window.AnkiFX_Config = parsed;
                    resolve(parsed);
                }
            };
            xhr.send();
        });

        // --- 2. Progressive Engine Initialization ---
        var engineInitialized = false;

        function tryInitEngine() {
            if (engineInitialized) return;
            if (window.AnkiFX && typeof window.AnkiFX.init === 'function') {
                afxLog("Engine script ready. Waiting for config to resolve...", "pending");
                configPromise.then(function (config) {
                    if (engineInitialized) return;
                    try {
                        engineInitialized = true;
                        afxLog("Initializing AnkiFX (" + (window.AnkiFX.source || 'unknown') + " v" + (window.AnkiFX.version || '1.0.0') + ")...");
                        window.AnkiFX.init(config || {});
                        afxLog("AnkiFX engine initialization success.", "success");
                    } catch (e) {
                        afxLog("AnkiFX init failed: " + e.message, "error");
                    }
                });
            }
        }

        // --- 3. Parallel Async Script Loading ---
        function loadScriptAsync(src, id) {
            afxLog("Injecting script: " + src);
            var script = document.createElement("script");
            script.src = src;
            script.async = true;
            if (id) script.id = id;
            script.onload = function () {
                afxLog("Script loaded successfully: " + src, "success");
                tryInitEngine();
            };
            script.onerror = function () {
                afxLog("Script failed to load: " + src, "warn");
                console.warn("[Loader] Failed to load script: " + src);
            };
            document.head.appendChild(script);
        }

        // Load local engine asynchronously (Only local engine for local-only templates)
        loadScriptAsync("_ankifx.js");

        // Safety fallback check in case script was already cached/evaluated before onload listeners bound
        setTimeout(tryInitEngine, 100);
        setTimeout(tryInitEngine, 500);
    })();
</script>

{{#Title}}<h3 id="myH1">{{Title}}</h3>{{/Title}}
{{#Question}}<p>{{Question}}</p>{{/Question}}

<div class="tappable">
    <table id="qtable"></table>
</div>

<div class="hidden" id="Q_solutions">{{Answers}}</div>
<div class="hidden" id="Card_Type">{{QType (0=kprim,1=mc,2=sc)}}</div>

<div class="hidden" id="Q_1">{{Q_1}}</div>
<div class="hidden" id="Q_2">{{Q_2}}</div>
<div class="hidden" id="Q_3">{{Q_3}}</div>
<div class="hidden" id="Q_4">{{Q_4}}</div>
<div class="hidden" id="Q_5">{{Q_5}}</div>

<script>
    // --- ANKI TABLE GENERATION LOGIC ---
    function generateTable(attempts = 0) {
        const qtable = document.getElementById('qtable');
        const cardTypeEl = document.getElementById("Card_Type");
        
        // If mandatory elements are missing, retry
        if (!qtable || !cardTypeEl) {
            if (attempts < 50) {
                setTimeout(() => generateTable(attempts + 1), 50);
            }
            return;
        }

        const OPTIONS = { maxQuestionsToShow: 0 };
        var type = cardTypeEl.innerHTML;
        var table = document.createElement("table");
        var tbody = document.createElement("tbody");

        if (type == 0) tbody.innerHTML = '<tr><th>yes</th><th>no</th><th></th></tr>';

        stripHtmlTagsFromSolutionString();
        let solutions = getCorrectAnswers();
        if (!solutions) return;

        let questionTableHtmlLinesToSolution = [];

        for (var i = 0; true; i++) {
            let qEl = document.getElementById('Q_' + (i + 1));
            // If Q_x element is not yet in DOM, we might need to wait, 
            // but usually they arrive together with Card_Type.
            if (qEl && qEl.innerHTML != '') {
                var html = [];
                let answerText = qEl.innerHTML;
                let labelTag = (type == 0) ? '' : '<label for="inputQuestion' + (i + 1) + '">' + answerText + '</label>';
                let textAlign = (type == 0) ? 'center' : 'left';

                html.push('<tr>');
                var maxColumns = ((type == 0) ? 2 : 1);
                for (var j = 0; j < maxColumns; j++) {
                    let inputTag = '<input id="inputQuestion' + (i + 1) +
                        '" name="ans_' + ((type != 2) ? (i + 1) : 'A') +
                        '" type="' + ((type == 1) ? 'checkbox' : 'radio') +
                        '" value="' + ((j == 0) ? 1 : 0) + '">';
                    html.push('<td onInput="onCheck()" style="text-align: ' + textAlign + '">' + inputTag + labelTag + '</td>');
                }
                if (type == 0) html.push('<td>' + answerText + '</td>');
                html.push('</tr>');

                questionTableHtmlLinesToSolution.push({
                    html: html.join(""),
                    solution: solutions[i]
                });
            } else {
                break;
            }
        }
        
        if (questionTableHtmlLinesToSolution.length === 0) {
            // If we found NO questions but Card_Type was there, 
            // it's possible the mustache tags haven't rendered yet? 
            // (Unlikely but possible in some WebViews)
            if (attempts < 20) {
                setTimeout(() => generateTable(attempts + 1), 50);
                return;
            }
        }

        let shuffledQuestionTableHtmlLinesToSolution = getShuffledQuestionTableHtmlLinesToSolution(
            questionTableHtmlLinesToSolution, type, OPTIONS['maxQuestionsToShow']);

        let shuffledHtmlLines = shuffledQuestionTableHtmlLinesToSolution.map(o => o.html).join("");
        let shuffledSolutions = shuffledQuestionTableHtmlLinesToSolution.map(o => o.solution);

        tbody.innerHTML += shuffledHtmlLines;
        table.appendChild(tbody);
        qtable.innerHTML = table.innerHTML;

        storeCorrectAnswersInHtml(shuffledSolutions);
        onCheck();
    }


    function stripHtmlTagsFromSolutionString() {
        let solEl = document.getElementById("Q_solutions");
        if (solEl) {
            solEl.innerHTML = solEl.innerHTML.replace(/(<([^>]+)>)/gi, "");
        }
    }

    function getShuffledQuestionTableHtmlLinesToSolution(questionTableHtmlLinesToSolution, type, maxQuestionsToShow) {
        if (type != 2) {
            let shuffled = questionTableHtmlLinesToSolution.sort(() => Math.random() < 0.5 ? -1 : 1);
            return (maxQuestionsToShow > 1) ? shuffled.slice(0, maxQuestionsToShow) : shuffled;
        } else {
            let correctAnswer = questionTableHtmlLinesToSolution.find(o => o.solution == 1);
            let wrongAnswers = questionTableHtmlLinesToSolution.filter(o => o.solution == 0);
            wrongAnswers.sort(() => Math.random() < 0.5 ? -1 : 1);

            if (maxQuestionsToShow > 1) wrongAnswers = wrongAnswers.slice(0, maxQuestionsToShow - 1);

            let randomIndex = Math.floor(Math.random() * (wrongAnswers.length + 1));
            wrongAnswers.splice(randomIndex, 0, correctAnswer);
            return wrongAnswers;
        }
    }

    function isOptionChecked(optionRow, index) {
        let cells = optionRow.getElementsByTagName("td");
        if (cells[index]) {
            let inputs = cells[index].getElementsByTagName("input");
            if (inputs[0]) return inputs[0].checked;
        }
        return false;
    }

    function getUserAnswers() {
        const cardTypeEl = document.getElementById("Card_Type");
        const qtable = document.getElementById("qtable");
        if (!cardTypeEl || !qtable) return [];

        let type = cardTypeEl.innerHTML;
        let tbodies = qtable.getElementsByTagName('tbody');
        if (tbodies.length === 0) return [];

        let qrows = tbodies[0].getElementsByTagName("tr");
        let userAnswers = [];
        for (let i = 0; i < qrows.length; i++) {
            if (type == 0 && i == 0) continue; // Skip header
            if (type == 0) {
                if (isOptionChecked(qrows[i], 0)) userAnswers.push(1);
                else if (isOptionChecked(qrows[i], 1)) userAnswers.push(0);
                else userAnswers.push(2);
            } else {
                if (isOptionChecked(qrows[i], 0)) userAnswers.push(1);
                else userAnswers.push(0);
            }
        }
        return userAnswers;
    }

    function getCorrectAnswers() {
        let solEl = document.getElementById("Q_solutions");
        if (!solEl) return null;
        return solEl.innerHTML.split(" ").map(string => Number(string));
    }

    function storeCorrectAnswersInHtml(solutions) {
        let solEl = document.getElementById("Q_solutions");
        if (solEl) solEl.innerHTML = solutions.join(" ");
    }

    function onCheck() {
        if (typeof Persistence !== 'undefined' && Persistence.isAvailable()) {
            Persistence.clear();
            let userAns = getUserAnswers();
            let corrAns = getCorrectAnswers();
            if (userAns) Persistence.setItem('user_answers', userAns);
            if (corrAns) Persistence.setItem('Q_solutions', corrAns);
            Persistence.setItem('qtable', document.getElementById("qtable").innerHTML);
        }
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    function tickCheckboxOnNumberKeyDown(event) {
        const keyName = event.key;
        const qtable = document.getElementById("qtable");
        if (!qtable) return;

        let tableBodies = qtable.getElementsByTagName('tbody');
        if (tableBodies.length === 0) return;

        let tableRows = tableBodies[0].getElementsByTagName("tr");
        if (0 < +keyName && +keyName < 10 && tableRows[+keyName - 1]) {
            let tableData = tableRows[+keyName - 1].getElementsByTagName("td")[0];
            if (!tableData) return;
            let tableRow = tableData.getElementsByTagName("input")[0];
            if (!tableRow) return;
            tableRow.checked = !tableRow.checked;
            onCheck();
        }
    }

    function addCheckboxTickingShortcuts() {
        document.removeEventListener('keydown', tickCheckboxOnNumberKeyDown, false);
        document.addEventListener('keydown', tickCheckboxOnNumberKeyDown, false);
    }


    function isMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function run() {
        window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
        window.AnkiFX_Loader_Logs.push({ msg: "[Loader] Card content run() executed.", level: "success" });
        let DEFAULT_CARD_TYPE = 1;
        let DEFAULT_SOLUTIONS = "1 0 0 0 0";
        
        let cardTypeEl = document.getElementById("Card_Type");
        let solEl = document.getElementById("Q_solutions");
        if (!cardTypeEl || !solEl) return;

        if (isNaN(cardTypeEl.innerHTML)) {
            cardTypeEl.innerHTML = DEFAULT_CARD_TYPE;
        }
        if ('{' + '{Answers}' + '}' == solEl.innerHTML) {
            solEl.innerHTML = DEFAULT_SOLUTIONS;
        }

        if (cardTypeEl.innerHTML != 0 && !isMobile()) {
            addCheckboxTickingShortcuts();
        }
        generateTable();
    }

    // --- IMMEDIATE EXECUTION OF CARD CONTENT ---
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        run();
    } else {
        document.addEventListener('DOMContentLoaded', run);
    }
</script>
