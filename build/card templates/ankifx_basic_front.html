<!-- AnkiFX Template Metadata -->
<div id="ankifx-template-meta" style="display: none !important;" data-template-name="front_basic"
    data-template-version="1.0.0" data-engine-compatibility=">=1.0.0"></div>

<!-- Reserved Container for Update Banner -->
<div id="afx-update-banner-root"></div>

<script>
    window.AnkiFX_CDN_URL = window.AnkiFX_CDN_URL || "https://cdn.jsdelivr.net/gh/robkipa/ankifx@dev/build/_ankifx.js";
    (function () {
        "use strict";

        var scheduleCheck = window.requestIdleCallback || function (cb) { setTimeout(cb, 0); };

        scheduleCheck(function () {
            var metaEl = document.getElementById("ankifx-template-meta");
            if (!metaEl) return;

            var localVersion = metaEl.getAttribute("data-template-version") || "1.0.0";
            var templateName = metaEl.getAttribute("data-template-name") || "front_basic";

            var cdnUrl = window.AnkiFX_CDN_URL;
            var manifestUrl = cdnUrl.replace(/_ankifx\.js$/, "_afx_version.json");

            var dismissKey = "afx_dismiss_" + templateName + "_" + localVersion;

            function isDismissed() {
                try {
                    if (sessionStorage.getItem(dismissKey) === "true") return true;
                } catch (e) { }
                try {
                    if (localStorage.getItem(dismissKey) === "true") return true;
                } catch (e) { }
                try {
                    if (window.AnkiFX_Dismissed_Templates && window.AnkiFX_Dismissed_Templates[dismissKey]) return true;
                } catch (e) { }
                return false;
            }

            function setDismissed() {
                try {
                    sessionStorage.setItem(dismissKey, "true");
                } catch (e) { }
                try {
                    localStorage.setItem(dismissKey, "true");
                } catch (e) { }
                try {
                    window.AnkiFX_Dismissed_Templates = window.AnkiFX_Dismissed_Templates || {};
                    window.AnkiFX_Dismissed_Templates[dismissKey] = true;
                } catch (e) { }
            }

            if (isDismissed()) return;

            function parseVersion(v) {
                if (!v) return { parts: [0, 0, 0], isPre: false, preType: 3, preNumber: 0 };
                var clean = String(v).replace(/^v/, "");
                var hasBuild = clean.indexOf("+");
                if (hasBuild !== -1) clean = clean.substring(0, hasBuild);

                var hasPre = clean.indexOf("-");
                var isPre = hasPre !== -1;
                var base = isPre ? clean.substring(0, hasPre) : clean;
                var preTag = isPre ? clean.substring(hasPre + 1).toLowerCase() : "";

                var parts = base.split(".").map(function (p) {
                    var val = parseInt(p, 10);
                    return isNaN(val) ? 0 : val;
                });

                var preType = 3; // default: stable
                var preNumber = 0;
                if (isPre) {
                    if (preTag.indexOf("alpha") !== -1) preType = 0;
                    else if (preTag.indexOf("beta") !== -1) preType = 1;
                    else if (preTag.indexOf("rc") !== -1) preType = 2;

                    var numMatch = preTag.match(/\d+/);
                    if (numMatch) preNumber = parseInt(numMatch[0], 10);
                }

                return {
                    parts: [parts[0] || 0, parts[1] || 0, parts[2] || 0],
                    isPre: isPre,
                    preType: preType,
                    preNumber: preNumber
                };
            }

            function isNewer(local, remote) {
                try {
                    var a = parseVersion(local);
                    var b = parseVersion(remote);
                    for (var i = 0; i < 3; i++) {
                        if (a.parts[i] < b.parts[i]) return true;
                        if (a.parts[i] > b.parts[i]) return false;
                    }
                    if (a.preType < b.preType) return true;
                    if (a.preType > b.preType) return false;
                    if (a.preNumber < b.preNumber) return true;
                } catch (err) { }
                return false;
            }

            function injectStyles() {
                if (document.getElementById("ankifx-update-styles")) return;
                var style = document.createElement("style");
                style.id = "ankifx-update-styles";
                style.textContent =
                    ".afx-update-notice {" +
                    "  background: rgba(30, 20, 35, 0.95);" +
                    "  backdrop-filter: blur(12px);" +
                    "  -webkit-backdrop-filter: blur(12px);" +
                    "  border: 1px solid rgba(255, 0, 255, 0.4);" +
                    "  border-radius: 12px;" +
                    "  padding: 12px 18px;" +
                    "  width: 100%;" +
                    "  box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);" +
                    "  display: flex;" +
                    "  align-items: center;" +
                    "  justify-content: space-between;" +
                    "  gap: 12px;" +
                    "  opacity: 0;" +
                    "  pointer-events: auto;" +
                    "  transition: opacity 0.38s ease, transform 0.38s ease;" +
                    "  box-sizing: border-box;" +
                    "  transform: translateY(-20px);" +
                    "  font-family: SFMono-Regular, Consolas, Menlo, monospace;" +
                    "  margin: 10px 0;" +
                    "}" +
                    ".afx-update-notice.afx-visible {" +
                    "  opacity: 1;" +
                    "  transform: translateY(0);" +
                    "}" +
                    ".afx-update-notice-content {" +
                    "  flex: 1;" +
                    "  color: #f0f0f0;" +
                    "  font-size: 11px;" +
                    "  line-height: 1.5;" +
                    "  text-align: left;" +
                    "}" +
                    ".afx-update-notice-title {" +
                    "  font-weight: bold;" +
                    "  color: #ff00ff;" +
                    "  margin: 0 0 2px 0;" +
                    "  text-transform: uppercase;" +
                    "  font-size: 12px;" +
                    "  letter-spacing: 0.5px;" +
                    "}" +
                    ".afx-update-notice-link {" +
                    "  color: #00ffff;" +
                    "  text-decoration: underline;" +
                    "  cursor: pointer;" +
                    "  font-weight: bold;" +
                    "}" +
                    ".afx-update-notice-close {" +
                    "  background: transparent;" +
                    "  border: none;" +
                    "  color: rgba(255,255,255,0.6);" +
                    "  font-size: 18px;" +
                    "  cursor: pointer;" +
                    "  padding: 4px;" +
                    "  line-height: 1;" +
                    "  transition: color 0.2s, transform 0.2s;" +
                    "  display: flex;" +
                    "  align-items: center;" +
                    "  justify-content: center;" +
                    "}" +
                    ".afx-update-notice-close:hover {" +
                    "  color: #fff;" +
                    "  transform: scale(1.15);" +
                    "}";
                document.head.appendChild(style);
            }

            function showNotice(remoteVersion, changelog) {
                injectStyles();
                var notice = document.createElement("div");
                notice.className = "afx-update-notice";

                var targetUrl = "https://github.com/robkipa/ankifx";
                var displayUrl = "github.com/robkipa/ankifx";
                if (cdnUrl.indexOf("github") !== -1 || cdnUrl.indexOf("jsdelivr") !== -1) {
                    var match = cdnUrl.match(/github(?:\.com)?\/([^\/]+\/[^\/]+)/) || cdnUrl.match(/jsdelivr\.net\/gh\/([^\/]+\/[^\/]+)/);
                    if (match) {
                        var slug = match[1].split("@")[0];
                        targetUrl = "https://github.com/" + slug;
                        displayUrl = "github.com/" + slug;
                    }
                }

                var changelogText = changelog ? " (" + changelog + ")" : "";
                notice.innerHTML =
                    "<div class='afx-update-notice-content'>" +
                    "  <div class='afx-update-notice-title'>Template Update Available</div>" +
                    "  <div>" +
                    "    Card template is v" + localVersion + ". Latest is v" + remoteVersion + changelogText + ".<br>" +
                    "    Please visit <a class='afx-update-notice-link' href='" + targetUrl + "' target='_blank'>" + displayUrl + "</a> and copy the latest template." +
                    "  </div>" +
                    "</div>" +
                    "<button class='afx-update-notice-close' title='Dismiss'>&times;</button>";

                var closeBtn = notice.querySelector(".afx-update-notice-close");
                closeBtn.addEventListener("click", function (e) {
                    e.stopPropagation();
                    notice.classList.remove("afx-visible");
                    setDismissed();
                    setTimeout(function () { notice.remove(); }, 400);
                });

                var link = notice.querySelector(".afx-update-notice-link");
                link.addEventListener("click", function (e) {
                    e.stopPropagation();
                });

                var stopProps = function (e) { e.stopPropagation(); };
                ["touchstart", "touchend", "mousedown", "mouseup", "click"].forEach(function (evt) {
                    notice.addEventListener(evt, stopProps, { passive: true });
                });

                var container = document.getElementById("afx-update-banner-root");
                if (container) {
                    window.requestAnimationFrame(function () {
                        container.appendChild(notice);
                        window.requestAnimationFrame(function () {
                            notice.classList.add("afx-visible");
                        });
                    });
                }
            }

            var fetchTimeout = 2000;
            var requestCompleted = false;

            function handleManifest(manifestText) {
                if (requestCompleted) return;
                requestCompleted = true;
                try {
                    var manifest = JSON.parse(manifestText);
                    var remoteVersion = (manifest.templates && manifest.templates[templateName])
                        || manifest.latestTemplateVersion;
                    if (remoteVersion && isNewer(localVersion, remoteVersion)) {
                        showNotice(remoteVersion, manifest.changelog);
                    }
                } catch (err) { }
            }

            if (typeof window.fetch === "function" && typeof window.AbortController === "function") {
                var controller = new AbortController();
                var signal = controller.signal;
                var timeoutId = setTimeout(function () {
                    controller.abort();
                }, fetchTimeout);

                window.fetch(manifestUrl, { signal: signal })
                    .then(function (res) {
                        clearTimeout(timeoutId);
                        if (res.status === 200) {
                            return res.text();
                        }
                        throw new Error("HTTP " + res.status);
                    })
                    .then(function (text) {
                        if (text) handleManifest(text);
                    })
                    .catch(function () {
                        runXHR();
                    });
            } else {
                runXHR();
            }

            function runXHR() {
                if (requestCompleted) return;
                var xhr = new XMLHttpRequest();
                xhr.open("GET", manifestUrl, true);
                xhr.timeout = fetchTimeout;
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            handleManifest(xhr.responseText);
                        }
                    }
                };
                xhr.ontimeout = function () {
                    xhr.abort();
                };
                xhr.onerror = function () {
                    xhr.abort();
                };
                xhr.send();
            }
        });
    })();
</script>

<div id="afx-config-field" style="display: none !important;">{{AnkiFXConfig}}</div>

<script>
    (function () {
        var fieldContainer = document.getElementById("afx-config-field");
        var configText = fieldContainer ? fieldContainer.textContent.trim() : "";
        var parsed = false;

        function decodeConfig(config) {
            if (config && typeof config.termsText === 'string') {
                try {
                    config.termsText = decodeURIComponent(escape(atob(config.termsText)));
                } catch (e) {
                    console.error("AnkiFX: Failed to decode termsText base64 string.", e);
                }
            }
            return config;
        }

        if (configText) {
            // Replace non-breaking spaces (\u00a0) with standard spaces to prevent JSON.parse syntax errors from Anki copy-paste
            configText = configText.replace(/\u00a0/g, ' ');
            // Resiliently strip trailing commas from JSON objects/arrays to prevent standard JSON.parse parsing failures
            configText = configText.replace(/,(\s*[\]}])/g, '$1').trim();
            try {
                window.AnkiFX_Config = decodeConfig(JSON.parse(configText));
                parsed = true;
            } catch (e) {
                console.error("AnkiFX: Failed to parse embedded AnkiFXConfig JSON. Falling back to _afx_defaults.json. Error:", e);
            }
        }

        if (!parsed) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "_afx_defaults.json", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 || xhr.status === 0) {
                        try {
                            window.AnkiFX_Config = decodeConfig(JSON.parse(xhr.responseText));
                        } catch (err) {
                            console.error("AnkiFX: Failed to parse fallback _afx_defaults.json.", err);
                            window.AnkiFX_Config = null; // Unblock loader on parse error
                        }
                    } else {
                        console.error("AnkiFX: Failed to load fallback _afx_defaults.json. Status: " + xhr.status);
                        window.AnkiFX_Config = null; // Unblock loader on load error
                    }
                }
            };
            xhr.send();
        }
    })();
</script>

<!-- Load the local offline engine backup first (static load is 100% mobile-resilient and CORS-safe) -->
<script src="_ankifx.js" onerror="console.warn('AnkiFX: Local engine backup not found in collection.media.')"></script>

<!-- Load the latest remote engine CDN (parsed sequentially, overrides local global if online) -->
<script>
    document.write('<script id="ankifx-engine-script" src="' + window.AnkiFX_CDN_URL + '" onerror="console.warn(\'AnkiFX: CDN failed to load, using local engine.\')"><\/script>');
</script>

<script>
    (function () {
        window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
        function afxLog(msg, level) {
            window.AnkiFX_Loader_Logs.push({ msg: msg, level: level || 'info' });
        }
        var remoteScript = document.getElementById('ankifx-engine-script');
        if (remoteScript) {
            if (window.AnkiFX && window.AnkiFX.source === 'remote') {
                window.AnkiFX_Remote_Status = "loaded";
                afxLog("Remote engine script loaded (sync).", "success");
            } else {
                window.AnkiFX_Remote_Status = "pending";
                afxLog("Remote engine script pending...", "pending");
                remoteScript.addEventListener('load', function () {
                    window.AnkiFX_Remote_Status = "loaded";
                    afxLog("Remote engine script onload fired (async).", "success");
                    if (typeof triggerAnkiFX === 'function') triggerAnkiFX();
                });
                remoteScript.addEventListener('error', function () {
                    window.AnkiFX_Remote_Status = "failed";
                    afxLog("Remote engine script onerror fired (async).", "warn");
                    if (typeof triggerAnkiFX === 'function') triggerAnkiFX();
                });
            }
        }
    })();
</script>

<script>
    // Initialize global loader logs
    window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
    function afxLog(msg, level) {
        window.AnkiFX_Loader_Logs.push({ msg: msg, level: level || 'info' });
    }
    afxLog("Template loaded.", "info");

    // Closure-scoped flags to prevent duplicate execution within the same card's lifecycle
    var contentInitialized = false;
    var ankiFXInitialized = false;

    /**
     * Resilient Polling AnkiFX Loader
     * Periodically polls for ready dependencies to bypass asynchronous WKWebView execution lags.
     */
    function triggerAnkiFX(attempts = 0) {
        window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
        if (attempts === 0) {
            afxLog("triggerAnkiFX called.", "info");
        }

        const remoteScriptExists = !!document.getElementById('ankifx-engine-script');
        const remoteStatus = window.AnkiFX_Remote_Status || (remoteScriptExists ? "pending" : "none");

        const hasAnkiFX = typeof AnkiFX !== 'undefined';
        const hasRun = typeof run === 'function';
        const hasConfig = typeof AnkiFX_Config !== 'undefined';

        if (hasAnkiFX && hasRun && hasConfig) {
            // Wait for remote engine to finish loading or fail (up to 800ms)
            const isWaitingForRemote = (remoteStatus === "pending") && (attempts < 16);
            if (isWaitingForRemote) {
                if (attempts % 5 === 0) {
                    afxLog("Waiting for remote script (Attempt " + attempts + ", status=" + remoteStatus + ")...", "pending");
                }
                setTimeout(() => triggerAnkiFX(attempts + 1), 50);
                return;
            }
            // 1. First initialize AnkiFX if it is loaded
            if (!ankiFXInitialized) {
                try {
                    afxLog("Initializing AnkiFX engine (Source: " + (AnkiFX.source || 'local') + ", Version: " + (AnkiFX.version || '1.0.0') + ")...", "info");
                    ankiFXInitialized = true;
                    AnkiFX.init();
                    afxLog("AnkiFX.init() success.", "success");
                } catch (e) {
                    afxLog("AnkiFX init error: " + e.message, "error");
                    console.error("AnkiFX Start Error:", e);
                }
            }

            // 2. Then run the card's native content/table generator
            if (!contentInitialized) {
                try {
                    afxLog("Running card content run()...", "info");
                    contentInitialized = true;
                    run();
                    afxLog("Card content run() success.", "success");
                } catch (e) {
                    afxLog("Card content error: " + e.message, "error");
                    console.error("Card Content Run Error:", e);
                }
            }
        } else if (attempts < 60) { // Poll for ~3 seconds
            if (attempts % 10 === 0) {
                afxLog("Polling (Attempt " + attempts + ": AnkiFX=" + hasAnkiFX + ", run=" + hasRun + ", Config=" + hasConfig + ")...", "pending");
            }
            setTimeout(() => triggerAnkiFX(attempts + 1), 50);
        } else {
            const err = "Loader timed out after 3.0s. AnkiFX: " + (hasAnkiFX ? "Loaded" : "FAILED") + ", run(): " + (hasRun ? "Defined" : "UNDEFINED") + ", Config: " + (hasConfig ? "Loaded" : "FAILED");
            afxLog(err, "error");
            console.error(err);
            // Graceful fallback: always execute card content even if loader fails/timeouts
            if (hasRun && !contentInitialized) {
                try {
                    afxLog("Loader timeout fallback: Running card content run()...", "warn");
                    contentInitialized = true;
                    run();
                } catch (runErr) {
                    console.error("AnkiFX Fallback Card Content Run Error:", runErr);
                }
            }
        }
    }
</script>

<script>
    // --- FINAL EXECUTION TRIGGER ---
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        triggerAnkiFX();
    } else {
        document.addEventListener('DOMContentLoaded', triggerAnkiFX);
    }
</script>
