    data-template-version="1.0.0" data-engine-compatibility=">=1.0.0"></div>

<script>
    window.AnkiFX_BOOTSTRAP = window.AnkiFX_BOOTSTRAP || {
        cdn: "https://cdn.jsdelivr.net/gh/robkipa/ankifx@v1/build/_ankifx.js",
        manifest: "https://cdn.jsdelivr.net/gh/robkipa/ankifx@v1/build/_afx_version.json"
    };

    (function () {
        "use strict";

        var scheduleCheck = window.requestIdleCallback || function (cb) { setTimeout(cb, 0); };

        scheduleCheck(function () {
            var metaEl = document.getElementById("ankifx-template-meta");
            if (!metaEl) return;

            var localVersion = metaEl.getAttribute("data-template-version") || "1.0.0";
            var templateName = metaEl.getAttribute("data-template-name") || "front_mcq";

            var manifestUrl = window.AnkiFX_BOOTSTRAP.manifest;

            var computedStatus = null;
            var requestCompleted = false;

            function parseVersion(v) {
                if (!v) return { parts: [0, 0, 0], isPre: false, preType: 3, preNumber: 0 };
                var clean = String(v).replace(/^v/, "");
                var hasBuild = clean.indexOf("+");
                if (hasBuild !== -1) clean = clean.substring(0, hasBuild);

                var hasPre = clean.indexOf("-");
                var isPre = hasPre !== -1;
                var base = isPre ? clean.substring(0, hasPre) : clean;
                var preTag = isPre ? clean.substring(hasPre + 1).toLowerCase() : "";

                var parts = base.split(".").map(function (p) {
                    var val = parseInt(p, 10);
                    return isNaN(val) ? 0 : val;
                });

                var preType = 3; // default: stable
                var preNumber = 0;
                if (isPre) {
                    if (preTag.indexOf("alpha") !== -1) preType = 0;
                    else if (preTag.indexOf("beta") !== -1) preType = 1;
                    else if (preTag.indexOf("rc") !== -1) preType = 2;

                    var numMatch = preTag.match(/\d+/);
                    if (numMatch) preNumber = parseInt(numMatch[0], 10);
                }

                return {
                    parts: [parts[0] || 0, parts[1] || 0, parts[2] || 0],
                    isPre: isPre,
                    preType: preType,
                    preNumber: preNumber
                };
            }

            function isNewer(local, remote) {
                try {
                    var a = parseVersion(local);
                    var b = parseVersion(remote);
                    for (var i = 0; i < 3; i++) {
                        if (a.parts[i] < b.parts[i]) return true;
                        if (a.parts[i] > b.parts[i]) return false;
                    }
                    if (a.preType < b.preType) return true;
                    if (a.preType > b.preType) return false;
                    if (a.preNumber < b.preNumber) return true;
                } catch (err) { }
                return false;
            }

            function dispatchStatus(remoteVersion, changelog, isNewerVal) {
                if (requestCompleted) return;
                requestCompleted = true;

                var targetUrl = "https://github.com/robkipa/ankifx";
                var displayUrl = "github.com/robkipa/ankifx";
                if (manifestUrl.indexOf("github") !== -1 || manifestUrl.indexOf("jsdelivr") !== -1) {
                    var match = manifestUrl.match(/github(?:\.com)?\/([^\/]+\/[^\/]+)/) || manifestUrl.match(/jsdelivr\.net\/gh\/([^\/]+\/[^\/]+)/);
                    if (match) {
                        var slug = match[1].split("@")[0];
                        targetUrl = "https://github.com/" + slug;
                        displayUrl = "github.com/" + slug;
                    }
                }

                computedStatus = {
                    name: templateName,
                    local: localVersion,
                    remote: remoteVersion,
                    isNewer: isNewerVal,
                    changelog: changelog || "",
                    targetUrl: targetUrl,
                    displayUrl: displayUrl
                };

                window.dispatchEvent(new CustomEvent("ankifx:template-status", { detail: computedStatus }));
            }

            function handleManifest(manifestText) {
                try {
                    var manifest = JSON.parse(manifestText);
                    var remoteVersion = (manifest.templates && manifest.templates[templateName])
                        || manifest.latestTemplateVersion;
                    if (remoteVersion && isNewer(localVersion, remoteVersion)) {
                        dispatchStatus(remoteVersion, manifest.changelog, true);
                    } else {
                        dispatchStatus(remoteVersion || localVersion, "", false);
                    }
                } catch (err) { }
            }

            window.addEventListener("ankifx:request-template-status", function () {
                if (computedStatus) {
                    window.dispatchEvent(new CustomEvent("ankifx:template-status", { detail: computedStatus }));
                }
            });

            var fetchTimeout = 2000;

            if (typeof window.fetch === "function" && typeof window.AbortController === "function") {
                var controller = new AbortController();
                var signal = controller.signal;
                var timeoutId = setTimeout(function () {
                    controller.abort();
                }, fetchTimeout);

                window.fetch(manifestUrl, { signal: signal })
                    .then(function (res) {
                        clearTimeout(timeoutId);
                        if (res.status === 200) {
                            return res.text();
                        }
                        throw new Error("HTTP " + res.status);
                    })
                    .then(function (text) {
                        if (text) handleManifest(text);
                    })
                    .catch(function () {
                        runXHR();
                    });
            } else {
                runXHR();
            }

            function runXHR() {
                if (requestCompleted) return;
                var xhr = new XMLHttpRequest();
                xhr.open("GET", manifestUrl, true);
                xhr.timeout = fetchTimeout;
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            handleManifest(xhr.responseText);
                        }
                    }
                };
                xhr.ontimeout = function () { xhr.abort(); };
                xhr.onerror = function () { xhr.abort(); };
                xhr.send();
            }
        });
    })();
</script>

<div id="afx-config-field" style="display: none !important;">{{AnkiFXConfig}}</div>

<script>
    (function () {
        var fieldContainer = document.getElementById("afx-config-field");
        var configText = fieldContainer ? fieldContainer.textContent.trim() : "";
        var parsed = false;

        function decodeConfig(config) {
            if (config && typeof config.termsText === 'string') {
                try {
                    config.termsText = decodeURIComponent(escape(atob(config.termsText)));
                } catch (e) {
                    console.error("AnkiFX: Failed to decode termsText base64 string.", e);
                }
            }
            return config;
        }

        if (configText) {
            // Replace non-breaking spaces (\u00a0) with standard spaces to prevent JSON.parse syntax errors from Anki copy-paste
            configText = configText.replace(/\u00a0/g, ' ');
            // Resiliently strip trailing commas from JSON objects/arrays to prevent standard JSON.parse parsing failures
            configText = configText.replace(/,(\s*[\]}])/g, '$1').trim();
            try {
                window.AnkiFX_Config = decodeConfig(JSON.parse(configText));
                parsed = true;
            } catch (e) {
                console.error("AnkiFX: Failed to parse embedded AnkiFXConfig JSON. Falling back to _afx_defaults.json. Error:", e);
            }
        }

        if (!parsed) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "_afx_defaults.json", true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 || xhr.status === 0) {
                        try {
                            window.AnkiFX_Config = decodeConfig(JSON.parse(xhr.responseText));
                        } catch (err) {
                            console.error("AnkiFX: Failed to parse fallback _afx_defaults.json.", err);
                            window.AnkiFX_Config = null; // Unblock loader on parse error
                        }
                    } else {
                        console.error("AnkiFX: Failed to load fallback _afx_defaults.json. Status: " + xhr.status);
                        window.AnkiFX_Config = null; // Unblock loader on load error
                    }
                }
            };
            xhr.send();
        }
    })();
</script>

<script>
    // Initialize global loader logs
    window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
    function afxLog(msg, level) {
        window.AnkiFX_Loader_Logs.push({ msg: msg, level: level || 'info' });
    }
    afxLog("Template loaded.", "info");

    // Closure-scoped flags to prevent duplicate execution within the same card's lifecycle
    var contentInitialized = false;
    var ankiFXInitialized = false;

    /**
     * Resilient Polling AnkiFX Loader
     * Periodically polls for ready dependencies to bypass asynchronous WKWebView execution lags.
     */
    function triggerAnkiFX(attempts = 0) {
        window.AnkiFX_Loader_Logs = window.AnkiFX_Loader_Logs || [];
        if (attempts === 0) {
            afxLog("triggerAnkiFX called.", "info");
        }

        const remoteScriptExists = !!document.getElementById('ankifx-engine-script');
        const remoteStatus = window.AnkiFX_Remote_Status || (remoteScriptExists ? "pending" : "none");

        const hasAnkiFX = typeof AnkiFX !== 'undefined';
        const hasRun = typeof run === 'function';
        const hasConfig = typeof AnkiFX_Config !== 'undefined';

        if (hasAnkiFX && hasRun && hasConfig) {
            // Wait for remote engine to finish loading or fail (up to 800ms)
            const isWaitingForRemote = (remoteStatus === "pending") && (attempts < 16);
            if (isWaitingForRemote) {
                if (attempts % 5 === 0) {
                    afxLog("Waiting for remote script (Attempt " + attempts + ", status=" + remoteStatus + ")...", "pending");
                }
                setTimeout(() => triggerAnkiFX(attempts + 1), 50);
                return;
            }
            // 1. First initialize AnkiFX if it is loaded
            if (!ankiFXInitialized) {
                try {
                    afxLog("Initializing AnkiFX engine (Source: " + (AnkiFX.source || 'local') + ", Version: " + (AnkiFX.version || '1.0.0') + ")...", "info");
                    ankiFXInitialized = true;
                    AnkiFX.init();
                    afxLog("AnkiFX.init() success.", "success");
                } catch (e) {
                    afxLog("AnkiFX init error: " + e.message, "error");
                    console.error("AnkiFX Start Error:", e);
                }
            }

            // 2. Then run the card's native content/table generator
            if (!contentInitialized) {
                try {
                    afxLog("Running card content run()...", "info");
                    contentInitialized = true;
                    run();
                    afxLog("Card content run() success.", "success");
                } catch (e) {
                    afxLog("Card content error: " + e.message, "error");
                    console.error("Card Content Run Error:", e);
                }
            }
        } else if (attempts < 60) { // Poll for ~3 seconds
            if (attempts % 10 === 0) {
                afxLog("Polling (Attempt " + attempts + ": AnkiFX=" + hasAnkiFX + ", run=" + hasRun + ", Config=" + hasConfig + ")...", "pending");
            }
            setTimeout(() => triggerAnkiFX(attempts + 1), 50);
        } else {
            const err = "Loader timed out after 3.0s. AnkiFX: " + (hasAnkiFX ? "Loaded" : "FAILED") + ", run(): " + (hasRun ? "Defined" : "UNDEFINED") + ", Config: " + (hasConfig ? "Loaded" : "FAILED");
            afxLog(err, "error");
            console.error(err);
            // Graceful fallback: always execute card content even if loader fails/timeouts
            if (hasRun && !contentInitialized) {
                try {
                    afxLog("Loader timeout fallback: Running card content run()...", "warn");
                    contentInitialized = true;
                    run();
                } catch (runErr) {
                    console.error("AnkiFX Fallback Card Content Run Error:", runErr);
                }
            }
        }
    }
</script>

    <table id="qtable"></table>
</div>

<div class="hidden" id="Q_solutions">{{Answers}}</div>
<div class="hidden" id="Card_Type">{{QType (0=kprim,1=mc,2=sc)}}</div>

<div class="hidden" id="Q_1">{{Q_1}}</div>
<div class="hidden" id="Q_2">{{Q_2}}</div>
<div class="hidden" id="Q_3">{{Q_3}}</div>
<div class="hidden" id="Q_4">{{Q_4}}</div>
<div class="hidden" id="Q_5">{{Q_5}}</div>

<script>
    // --- ANKI TABLE GENERATION LOGIC ---
    function generateTable(attempts = 0) {
        const qtable = document.getElementById('qtable');
        const cardTypeEl = document.getElementById("Card_Type");

        // If mandatory elements are missing, retry
        if (!qtable || !cardTypeEl) {
            if (attempts < 50) {
                setTimeout(() => generateTable(attempts + 1), 50);
            }
            return;
        }

        const OPTIONS = { maxQuestionsToShow: 0 };
        var type = cardTypeEl.innerHTML;
        var table = document.createElement("table");
        var tbody = document.createElement("tbody");

        if (type == 0) tbody.innerHTML = '<tr><th>yes</th><th>no</th><th></th></tr>';

        stripHtmlTagsFromSolutionString();
        let solutions = getCorrectAnswers();
        if (!solutions) return;

        let questionTableHtmlLinesToSolution = [];

        for (var i = 0; true; i++) {
            let qEl = document.getElementById('Q_' + (i + 1));
            // If Q_x element is not yet in DOM, we might need to wait, 
            // but usually they arrive together with Card_Type.
            if (qEl && qEl.innerHTML != '') {
                var html = [];
                let answerText = qEl.innerHTML;
                let labelTag = (type == 0) ? '' : '<label for="inputQuestion' + (i + 1) + '">' + answerText + '</label>';
                let textAlign = (type == 0) ? 'center' : 'left';

                html.push('<tr>');
                var maxColumns = ((type == 0) ? 2 : 1);
                for (var j = 0; j < maxColumns; j++) {
                    let inputTag = '<input id="inputQuestion' + (i + 1) +
                        '" name="ans_' + ((type != 2) ? (i + 1) : 'A') +
                        '" type="' + ((type == 1) ? 'checkbox' : 'radio') +
                        '" value="' + ((j == 0) ? 1 : 0) + '">';
                    html.push('<td onInput="onCheck()" style="text-align: ' + textAlign + '">' + inputTag + labelTag + '</td>');
                }
                if (type == 0) html.push('<td>' + answerText + '</td>');
                html.push('</tr>');

                questionTableHtmlLinesToSolution.push({
                    html: html.join(""),
                    solution: solutions[i]
                });
            } else {
                break;
            }
        }

        if (questionTableHtmlLinesToSolution.length === 0) {
            // If we found NO questions but Card_Type was there, 
            // it's possible the mustache tags haven't rendered yet? 
            // (Unlikely but possible in some WebViews)
            if (attempts < 20) {
                setTimeout(() => generateTable(attempts + 1), 50);
                return;
            }
        }

        let shuffledQuestionTableHtmlLinesToSolution = getShuffledQuestionTableHtmlLinesToSolution(
            questionTableHtmlLinesToSolution, type, OPTIONS['maxQuestionsToShow']);

        let shuffledHtmlLines = shuffledQuestionTableHtmlLinesToSolution.map(o => o.html).join("");
        let shuffledSolutions = shuffledQuestionTableHtmlLinesToSolution.map(o => o.solution);

        tbody.innerHTML += shuffledHtmlLines;
        table.appendChild(tbody);
        qtable.innerHTML = table.innerHTML;

        storeCorrectAnswersInHtml(shuffledSolutions);
        onCheck();
    }


    function stripHtmlTagsFromSolutionString() {
        let solEl = document.getElementById("Q_solutions");
        if (solEl) {
            solEl.innerHTML = solEl.innerHTML.replace(/(<([^>]+)>)/gi, "");
        }
    }

    function getShuffledQuestionTableHtmlLinesToSolution(questionTableHtmlLinesToSolution, type, maxQuestionsToShow) {
        if (type != 2) {
            let shuffled = questionTableHtmlLinesToSolution.sort(() => Math.random() < 0.5 ? -1 : 1);
            return (maxQuestionsToShow > 1) ? shuffled.slice(0, maxQuestionsToShow) : shuffled;
        } else {
            let correctAnswer = questionTableHtmlLinesToSolution.find(o => o.solution == 1);
            let wrongAnswers = questionTableHtmlLinesToSolution.filter(o => o.solution == 0);
            wrongAnswers.sort(() => Math.random() < 0.5 ? -1 : 1);

            if (maxQuestionsToShow > 1) wrongAnswers = wrongAnswers.slice(0, maxQuestionsToShow - 1);

            let randomIndex = Math.floor(Math.random() * (wrongAnswers.length + 1));
            wrongAnswers.splice(randomIndex, 0, correctAnswer);
            return wrongAnswers;
        }
    }

    function isOptionChecked(optionRow, index) {
        let cells = optionRow.getElementsByTagName("td");
        if (cells[index]) {
            let inputs = cells[index].getElementsByTagName("input");
            if (inputs[0]) return inputs[0].checked;
        }
        return false;
    }

    function getUserAnswers() {
        const cardTypeEl = document.getElementById("Card_Type");
        const qtable = document.getElementById("qtable");
        if (!cardTypeEl || !qtable) return [];

        let type = cardTypeEl.innerHTML;
        let tbodies = qtable.getElementsByTagName('tbody');
        if (tbodies.length === 0) return [];

        let qrows = tbodies[0].getElementsByTagName("tr");
        let userAnswers = [];
        for (let i = 0; i < qrows.length; i++) {
            if (type == 0 && i == 0) continue; // Skip header
            if (type == 0) {
                if (isOptionChecked(qrows[i], 0)) userAnswers.push(1);
                else if (isOptionChecked(qrows[i], 1)) userAnswers.push(0);
                else userAnswers.push(2);
            } else {
                if (isOptionChecked(qrows[i], 0)) userAnswers.push(1);
                else userAnswers.push(0);
            }
        }
        return userAnswers;
    }

    function getCorrectAnswers() {
        let solEl = document.getElementById("Q_solutions");
        if (!solEl) return null;
        return solEl.innerHTML.split(" ").map(string => Number(string));
    }

    function storeCorrectAnswersInHtml(solutions) {
        let solEl = document.getElementById("Q_solutions");
        if (solEl) solEl.innerHTML = solutions.join(" ");
    }

    function onCheck() {
        if (typeof Persistence !== 'undefined' && Persistence.isAvailable()) {
            Persistence.clear();
            let userAns = getUserAnswers();
            let corrAns = getCorrectAnswers();
            if (userAns) Persistence.setItem('user_answers', userAns);
            if (corrAns) Persistence.setItem('Q_solutions', corrAns);
            Persistence.setItem('qtable', document.getElementById("qtable").innerHTML);
        }
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    function tickCheckboxOnNumberKeyDown(event) {
        const keyName = event.key;
        const qtable = document.getElementById("qtable");
        if (!qtable) return;

        let tableBodies = qtable.getElementsByTagName('tbody');
        if (tableBodies.length === 0) return;

        let tableRows = tableBodies[0].getElementsByTagName("tr");
        if (0 < +keyName && +keyName < 10 && tableRows[+keyName - 1]) {
            let tableData = tableRows[+keyName - 1].getElementsByTagName("td")[0];
            if (!tableData) return;
            let tableRow = tableData.getElementsByTagName("input")[0];
            if (!tableRow) return;
            tableRow.checked = !tableRow.checked;
            onCheck();
        }
    }

    function addCheckboxTickingShortcuts() {
        document.removeEventListener('keydown', tickCheckboxOnNumberKeyDown, false);
        document.addEventListener('keydown', tickCheckboxOnNumberKeyDown, false);
    }


    function isMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function run() {
        let DEFAULT_CARD_TYPE = 1;
        let DEFAULT_SOLUTIONS = "1 0 0 0 0";

        let cardTypeEl = document.getElementById("Card_Type");
        let solEl = document.getElementById("Q_solutions");
        if (!cardTypeEl || !solEl) return;

        if (isNaN(cardTypeEl.innerHTML)) {
            cardTypeEl.innerHTML = DEFAULT_CARD_TYPE;
        }
        if ('{' + '{Answers}' + '}' == solEl.innerHTML) {
            solEl.innerHTML = DEFAULT_SOLUTIONS;
        }

        if (cardTypeEl.innerHTML != 0 && !isMobile()) {
            addCheckboxTickingShortcuts();
        }
        setTimeout(generateTable, 1);
    }

    // --- FINAL EXECUTION TRIGGER ---
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        triggerAnkiFX();
    } else {
        document.addEventListener('DOMContentLoaded', triggerAnkiFX);
    }
</script>
