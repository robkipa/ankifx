<script>
    // Fallback logic: If the CDN is offline or blocked, load the local collection.media copy
    function loadAnkiFXFallback() {
        if (window.AnkiFX_FallbackLoaded) return;
        window.AnkiFX_FallbackLoaded = true;
        console.warn("AnkiFX: Remote CDN offline or device offline. Falling back to local collection.media engine...");
        const fallbackScript = document.createElement('script');
        fallbackScript.src = "_ankifx.js"; // Local backup
        fallbackScript.onerror = function () {
            console.error("AnkiFX Critical: Both remote CDN and local fallback failed to load.");
        };
        document.head.appendChild(fallbackScript);
    }
</script>

<script>

    /**
     * AnkiFX Loader
     * Simplified initialization to prevent race conditions and ensure DOM readiness.
     */
    function triggerAnkiFX(attempts = 0) {
        if (typeof AnkiFX !== 'undefined') {
            try {
                AnkiFX.init();
                // Add your custom deck/card init logic below if needed
            } catch (e) {
                console.error("AnkiFX Start Error:", e);
            }
        } else if (attempts < 50) { // Poll for ~2.5 seconds
            setTimeout(() => triggerAnkiFX(attempts + 1), 50);
        } else {
            console.error("AnkiFX Error: Loader timed out after 2.5s.");
        }
    }

    // --- FINAL EXECUTION TRIGGER ---
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        triggerAnkiFX();
    } else {
        document.addEventListener('DOMContentLoaded', triggerAnkiFX);
    }
</script>
