name: Release

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Verify and Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the full git clone (including history and all tags)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node environment, defaulting to v20 LTS (matching engines or fallbacks)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install project dependencies cleanly using npm ci
      - name: Install Dependencies
        run: |
          set -e
          npm ci

      # 4. Run native node test runner suites (release gating)
      - name: Run Tests
        run: |
          set -e
          npm test

      # 5. Validate that committed build artifacts match a clean rebuild
      - name: Validate Committed Artifacts
        run: |
          set -e
          # 5a. Create a snapshot of currently committed tracked build outputs
          mkdir -p /tmp/committed-build
          cp build/_ankifx.js           /tmp/committed-build/
          cp build/_afx_defaults.json   /tmp/committed-build/
          cp build/_afx_version.json    /tmp/committed-build/
          cp -r "build/card templates"  /tmp/committed-build/

          # 5b. Generate a clean rebuild
          npm run build

          # 5c/d/e. Run recursive diff to ensure committed assets match rebuild.
          # We ignore the gitignored 'configs' folder and exclude the engine bundle '_ankifx.js'
          # because it embeds a non-deterministic compile timestamp (process.env.BUILD_DATE)
          # which will differ on every build attempt.
          if ! diff -r --strip-trailing-cr --exclude="configs" --exclude="_ankifx.js" /tmp/committed-build build; then
              echo "::error::Build artifacts in the repository do not match a clean rebuild."
              echo "::error::Run npm run build locally and commit the result before tagging."
              exit 1
          fi

      # 6. Extract CHANGELOG.md notes for the current release tag
      - name: Extract Release Notes
        id: notes
        run: |
          set -e
          # We use a simple inline Node snippet to parse and extract the Markdown section
          # matching the release version tag from CHANGELOG.md if it exists.
          node -e '
            const fs = require("fs");
            if (fs.existsSync("CHANGELOG.md")) {
              const content = fs.readFileSync("CHANGELOG.md", "utf8");
              const tag = process.env.REF_NAME;
              const version = tag.replace(/^v/, "");
              const escapedVersion = version.replace(/\./g, "\\.");
              const regex = new RegExp(`##\\s*\\[?${escapedVersion}\\]?[^\\n]*\\n+(.*?)(?=\\n##\\s|$)`, "s");
              const match = content.match(regex);
              if (match) {
                fs.writeFileSync("release_body.md", match[1].trim());
                process.exit(0);
              }
            }
            fs.writeFileSync("release_body.md", "");
          '
        env:
          REF_NAME: ${{ github.ref_name }}

      # 7. Create GitHub Release and attach release assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            build/_ankifx.js
            build/_afx_defaults.json
            build/_afx_version.json
            build/card templates/ankifx_mcq_front.html
            build/card templates/ankifx_basic_front.html
            build/card templates/ankifx_mcq_back.html
            build/card templates/ankifx_basic_back.html
            build/card templates/card_styling.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. Generate workflow summary detailing commit lineage and asset file sizes
      - name: Generate Workflow Summary
        run: |
          set -e
          # Resolve target source and build commit hashes
          TAG_COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -q "^build:"; then
              # Tagged commit is the automated build commit
              BUILD_SHA=$TAG_COMMIT_SHA
              SRC_SHA=$(git rev-parse HEAD^1)
          else
              # Tagged commit is the source commit (resolve next build commit)
              SRC_SHA=$TAG_COMMIT_SHA
              SRC_SHORT_SHA=$(git rev-parse --short $SRC_SHA)
              BUILD_SHA=$(git log --all --grep="build: compile build for $SRC_SHORT_SHA" --pretty=%H -n 1)
              if [ -z "$BUILD_SHA" ]; then
                  # Fallback to the next commit on the current branch
                  BUILD_SHA=$(git log --ancestry-path $SRC_SHA..HEAD --pretty=%H | tail -n 1 || echo "unknown")
              fi
          fi

          {
            echo "## AnkiFX Release Verification Summary 🪄"
            echo "- **Release Tag**: \`${{ github.ref_name }}\`"
            echo "- **Source Commit (Code changes)**: \`$SRC_SHA\`"
            echo "- **Build Commit (Compiled bundle)**: \`$BUILD_SHA\`"
            echo ""
            echo "### Verified Release Assets"
            for f in build/_ankifx.js build/_afx_defaults.json build/_afx_version.json "build/card templates/"* ; do
                if [ -f "$f" ]; then
                    size=$(du -h "$f" | cut -f1)
                    echo "- \`$f\` ($size)"
                fi
            done
          } >> $GITHUB_STEP_SUMMARY
